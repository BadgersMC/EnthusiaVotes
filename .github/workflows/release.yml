name: release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-java@3a4f6e1af504cf6a31855fa899c6aa5355ba6c12  # v4.7.1
        with:
          distribution: temurin
          java-version: 21

      - name: Bump version
        id: bump
        run: |
          LATEST=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -1)
          if [ -z "$LATEST" ]; then
            BASE=$(grep -oP 'findProperty.*\?:\s*"\K[^"]+' build.gradle.kts)
            MAJOR=$(echo "$BASE" | cut -d. -f1)
            MINOR=$(echo "$BASE" | cut -d. -f2)
            PATCH=$(echo "$BASE" | cut -d. -f3)
          else
            VER="${LATEST#v}"
            MAJOR=$(echo "$VER" | cut -d. -f1)
            MINOR=$(echo "$VER" | cut -d. -f2)
            PATCH=$(echo "$VER" | cut -d. -f3)
          fi
          NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "Latest tag: ${LATEST:-none}, bumping to v$NEXT"
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Build shadowJar
        env:
          RELEASE_VERSION: ${{ steps.bump.outputs.version }}
        run: ./gradlew shadowJar --no-daemon -PreleaseVersion="$RELEASE_VERSION"

      - name: Create Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          name: EnthusiaVotes v${{ steps.bump.outputs.version }}
          files: build/libs/EnthusiaVotes-${{ steps.bump.outputs.version }}.jar
          generate_release_notes: true
          fail_on_unmatched_files: true
          make_latest: true
