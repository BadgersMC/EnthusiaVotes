name: release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build shadowJar
        env:
          TAG: v0.1.${{ github.run_number }}
        run: ./gradlew shadowJar --no-daemon -PreleaseVersion="$TAG"

      - name: Create Release
        env:
          TAG: v0.1.${{ github.run_number }}
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$TAG" \
            build/libs/EnthusiaVotes-"$TAG".jar \
            --title "EnthusiaVotes $TAG" \
            --generate-notes
