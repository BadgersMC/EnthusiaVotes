# EnthusiaVotes configuration

storage:
  backend: sqlite  # "sqlite" (default) or "mariadb"
  file: "votes.db"
  mariadb:
    host: "localhost"
    port: 3306
    database: "enthusiavotes"
    user: "enthusia"
    password: "changeme"

# Gold range per vote
gold:
  min: 1
  max: 10

# VoteParty: activates after this many total votes
vote-party:
  threshold: 100
  duration-minutes: 5

# Reminder interval in minutes (how often players see the vote reminder)
reminder-interval-minutes: 5

# Sound played to the player when their vote is processed
# Valid sounds: https://hub.spigotmc.org/javadocs/bukkit/org/bukkit/Sound.html
vote-sound: "ENTITY_EXPERIENCE_ORB_PICKUP"

# Voting sites displayed in /vote and /votesites
vote-sites:
  - name: "Planet Minecraft"
    url: "https://www.planetminecraft.com/server/badgersmc/vote/"
  - name: "MinecraftServers.org"
    url: "https://minecraftservers.org/vote/123456"
  - name: "Minecraft-MP"
    url: "https://minecraft-mp.com/server/123456/vote/"
  - name: "TopG"
    url: "https://topg.org/minecraft-servers/server-123456/vote"
